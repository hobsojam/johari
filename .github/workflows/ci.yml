name: CI

on:
  push:
    branches: [main, 'feat/**']
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  server:
    name: Server tests
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: server
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 26
          cache: npm
          cache-dependency-path: server/package-lock.json
      - run: npm install
      - run: npm test

  client:
    name: Client tests & build
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: client
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 26
          cache: npm
          cache-dependency-path: client/package-lock.json
      - run: npm install
      - run: npm run test --if-present
      - run: npm run build

  docker:
    name: Docker build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - run: docker build .
